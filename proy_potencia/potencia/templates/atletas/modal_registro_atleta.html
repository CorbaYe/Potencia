<div id="datosAtletaModal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full backdrop-blur-sm bg-black/60 transition-opacity">
    
    <div class="relative p-4 w-full max-w-2xl max-h-full">
        
        <div class="relative bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl overflow-hidden">
            
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800 bg-gray-900/80">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="ph ph-user-plus text-emerald-500 text-2xl"></i>
                    Registrar Nuevo Atleta
                </h3>
                <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-800 hover:text-white rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center transition-colors" data-modal-hide="datosAtletaModal">
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
                    <span class="sr-only">Cerrar</span>
                </button>
            </div>
            
            <form method="post" action="{% url 'atletas' %}">
                {% csrf_token %}
                <div class="p-6 space-y-6">
                
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label for="documento" class="block mb-1.5 text-sm font-medium text-gray-300">Documento</label>
                                <!-- <input type="text" name="documento" id="documento" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full px-4 py-2.5 placeholder-gray-500 transition-colors" placeholder="Ej: 1077453071" required> -->
                                {{ form.documento }}
                            </div>
                            <div>
                                <label for="nombre" class="block mb-1.5 text-sm font-medium text-gray-300">Nombre Completo</label>
                                <!-- <input type="text" name="nombre" id="nombre" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full px-4 py-2.5 placeholder-gray-500 transition-colors" placeholder="Ej: Yeison Cordoba" required> -->
                                {{ form.nombre }}
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div>
                                <label for="edad" class="block mb-1.5 text-sm font-medium text-gray-300">Edad</label>
                                <!-- <input type="number" name="edad" id="edad" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full px-4 py-2.5 placeholder-gray-500 transition-colors" placeholder="Ej: 24" required> -->
                                {{ form.edad }}
                            </div>
                            <div>
                                <label for="genero" class="block mb-1.5 text-sm font-medium text-gray-300">Género</label>
                                <!-- <select name="genero" id="genero" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full px-4 py-2.5 transition-colors">
                                    <option value="" disabled selected>Seleccionar...</option>
                                    <option value="M">Masculino</option>
                                    <option value="F">Femenino</option>
                                </select> -->
                                {{ form.genero }}
                            </div>
                            <div>
                                <label for="entrenador" class="block mb-1.5 text-sm font-medium text-gray-300">Entrenador</label>
                                <!-- <select name="entrenador" id="entrenador" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full px-4 py-2.5 transition-colors">
                                    <option value="" disabled selected>Seleccionar...</option>
                                    <option value="1">Yirlesa Cordoba</option>
                                </select> -->
                                {{ form.entrenador }}
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-800/80">
                        <h4 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <i class="ph-fill ph-barbell"></i> Marcas Personales (kg)
                        </h4>
                        
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                            <div>
                                <label for="arranque" class="block mb-1.5 text-xs font-medium text-gray-400">Arranque</label>
                                <!-- <input type="number" name="arranque" id="arranque" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full px-3 py-2.5 text-center transition-colors" placeholder="0" required> -->
                                {{ form.arranque }}
                            </div>
                            <div>
                                <label for="envion" class="block mb-1.5 text-xs font-medium text-gray-400">Envión</label>
                                <!-- <input type="number" name="envion" id="envion" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full px-3 py-2.5 text-center transition-colors" placeholder="0" required> -->
                                {{ form.envion }}
                            </div>
                            <div>
                                <label for="s_delante" class="block mb-1.5 text-xs font-medium text-gray-400">S. Delante</label>
                                <!-- <input type="number" name="s_delante" id="s_delante" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full px-3 py-2.5 text-center transition-colors" placeholder="0" required> -->
                                {{ form.sentadilla_delante }}
                            </div>
                            <div>
                                <label for="s_detras" class="block mb-1.5 text-xs font-medium text-gray-400">S. Detrás</label>
                                <!-- <input type="number" name="s_detras" id="s_detras" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full px-3 py-2.5 text-center transition-colors" placeholder="0" required> -->
                                {{ form.sentadilla_detras }}
                            </div>
                        </div>
                    </div>

                </div>

                <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-800 bg-gray-900/50">
                    <button type="button" data-modal-hide="datosAtletaModal" class="px-5 py-2.5 text-sm font-medium text-gray-300 hover:text-white bg-transparent hover:bg-gray-800 border border-gray-700 rounded-xl transition-colors focus:ring-4 focus:outline-none focus:ring-gray-800">
                        Cancelar
                    </button>
                    <button type="submit" class="px-5 py-2.5 text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 rounded-xl transition-colors shadow-lg shadow-emerald-600/20 focus:ring-4 focus:outline-none focus:ring-emerald-800 flex items-center gap-2">
                        <i class="ph-bold ph-floppy-disk"></i>
                        Guardar Atleta
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
