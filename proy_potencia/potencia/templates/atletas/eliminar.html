<div id="eliminarAtltetaModal-{{ atleta.id }}" tabindex="-1" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full backdrop-blur-sm bg-black/60 transition-opacity">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl p-4 md:p-6 overflow-hidden">
            
            <button type="button" class="absolute top-3 end-2.5 text-gray-400 bg-transparent hover:bg-gray-800 hover:text-white rounded-lg text-sm w-9 h-9 ms-auto inline-flex justify-center items-center transition-colors" data-modal-hide="eliminarAtltetaModal-{{ atleta.id }}">
                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
                <span class="sr-only">Cerrar</span>
            </button>
            
            <div class="p-4 md:p-5 text-center">
                <svg class="mx-auto mb-4 text-red-500 w-12 h-12" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 13V8m0 8h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
                
                <h3 class="mb-2 text-lg font-normal text-gray-300">¿Estás seguro que deseas eliminar al atleta <strong class="text-white">{{ atleta.nombre }}</strong>?</h3>
                <h4 class="mb-6 text-sm text-gray-500">Documento: {{ atleta.documento }} | ID: {{ atleta.id }}</h4>
                
                <form method="post" action="{% url 'eliminar_atleta' atleta.id %}">
                    {% csrf_token %}
                    <div class="flex items-center space-x-4 justify-center">
                        
                        <button data-modal-hide="eliminarAtltetaModal-{{ atleta.id }}" type="button" class="text-gray-300 bg-transparent border border-gray-700 hover:bg-gray-800 hover:text-white focus:ring-4 focus:ring-gray-800 font-medium rounded-xl text-sm px-5 py-2.5 transition-colors focus:outline-none">
                            No, cancelar
                        </button>

                        <button type="submit" class="text-white bg-red-600 border border-transparent hover:bg-red-700 focus:ring-4 focus:ring-red-900 shadow-lg shadow-red-600/20 font-medium rounded-xl text-sm px-5 py-2.5 transition-colors focus:outline-none">
                            Sí, eliminar
                        </button>
                        
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
