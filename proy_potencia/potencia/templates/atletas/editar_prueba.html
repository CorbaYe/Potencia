<div id="editarAtletaModalPrueba-{{ atleta.id }}" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full backdrop-blur-sm bg-black/60 transition-opacity">
    <div class="relative p-4 w-full max-w-4xl max-h-full">
        <div class="relative bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl overflow-hidden">
            
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800 bg-gray-900/80">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="ph-bold ph-pencil-simple text-blue-500 text-2xl"></i>
                    Editando Atleta: <span class="text-blue-400 font-normal">{{ atleta.nombre }}</span>
                </h3>
                <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-800 hover:text-white rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center transition-colors" data-modal-hide="editarAtletaModalPrueba-{{ atleta.id }}">
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
                </button>
            </div>
            
            <form action="{% url 'editar_atleta' atleta.id %}" method="post">
                {% csrf_token %}
                <div class="p-6 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block mb-1.5 text-sm font-medium text-gray-300">Documento</label>
                            <input type="text" name="documento" value="{{ atleta.documento }}" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full px-4 py-2.5" required>
                        </div>
                        <div>
                            <label class="block mb-1.5 text-sm font-medium text-gray-300">Nombre Completo</label>
                            <input type="text" name="nombre" value="{{ atleta.nombre }}" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full px-4 py-2.5" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block mb-1.5 text-xs font-medium text-gray-400">Arranque</label>
                            <input type="number" name="arranque" value="{{ atleta.arranque }}" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl block w-full px-3 py-2.5 text-center" required>
                        </div>
                        <div>
                            <label class="block mb-1.5 text-xs font-medium text-gray-400">Envión</label>
                            <input type="number" name="envion" value="{{ atleta.envion }}" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-xl block w-full px-3 py-2.5 text-center" required>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-800 bg-gray-900/50">
                    <button type="button" data-modal-hide="editarAtletaModalPrueba-{{ atleta.id }}" class="px-5 py-2.5 text-sm font-medium text-gray-300 hover:bg-gray-800 rounded-xl transition-colors">Cancelar</button>
                    <button type="submit" class="px-5 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors">Actualizar Atleta</button>
                </div>
            </form>
        </div>
    </div>
</div>
