                </div>
                <input type="text" class="bg-gray-900 border border-gray-700 text-gray-200 text-sm rounded-xl focus:ring-lime-500/50 focus:border-lime-500 block w-full ps-10 p-2.5 transition-colors" placeholder="Buscar plan o atleta...">
            </div>

            </a>
        </div>
    </div>

    <div class="flex-1">
