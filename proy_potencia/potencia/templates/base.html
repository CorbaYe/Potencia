{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %} {% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script> 
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.3.0/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> -->

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="{% static 'css/style_home.css' %}">
    <link rel="stylesheet" href="{% static 'css/style_microciclos.css' %}">
    <link rel="stylesheet" href="{% static 'css/style_teoria.css' %}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'js/script_base_taiwil_colors.js' %}"></script>
    <style>
        .card {
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body class="bg-dark text-gray-200 h-screen flex overflow-hidden font-sans">
    <aside class="w-64 bg-card flex flex-col border-r border-gray-800 transition-all">
        <div class="p-6">
            <div class="flex items-center gap-2 text-primary font-bold text-2xl tracking-wider mb-10">
                <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
                <i class="ph-fill ph-lightning text-3xl"></i>POTENCIA
                </a>
            </div>

            <nav class="space-y-2">
                <a href="{% url 'planes' %}" class="flex items-center gap-3 bg-primary/10 text-primary px-4 py-3 rounded-lg font-medium transition-colors border border-primary/20">
                    <i class="ph ph-barbell text-xl"></i> Mis Planes
                </a>
                <a href="{% url 'atletas' %}" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 px-4 py-3 rounded-lg font-medium transition-colors">
                    <i class="ph ph-users text-xl"></i> Atletas    
                </a>
                <a href="{% url 'ejercicios' %}" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 px-4 py-3 rounded-lg font-medium transition-colors">
                    <i class="ph ph-notebook text-xl"></i> Batería de ejercicios
                </a>
                <a href="{% url 'dashboard_halterofilia' %}" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 px-4 py-3 rounded-lg font-medium transition-colors">
                    <i class="ph ph-book-open text-xl"></i> Teoría
                </a>
            </nav>
        </div>
        
        <div class="mt-auto p-6 space-y-2 border-t border-gray-800/50">
            <a href="#" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 px-4 py-3 rounded-lg font-medium transition-colors">
                <a class="nav-link" href="{% url 'configuracion_cuenta' %}">
                    <i class="ph ph-user-gear text-xl"></i> Mi cuenta
                </a>                        
            </a>
            <a href="{% url 'exit' %}" class="flex items-center gap-3 text-red-400 hover:text-red-300 hover:bg-red-900/20 px-4 py-3 rounded-lg font-medium transition-colors mt-2">
                <i class="ph ph-sign-out text-xl"></i> Cerrar sesión
            </a>
        </div>
    </aside>


    <main class="flex-1 overflow-y-auto p-8 lg:p-10">
        {% block contenido %} {% endblock %}
    </main>
   
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.3.0/dist/flowbite.min.js"></script>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> -->

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="{% static 'js/script_home.js' %}"></script>
    <script src="{% static 'js/script_grafico.js' %}"></script>
    <script src="{% static 'js/script_microciclos.js' %}"></script>
    <script src="{% static 'js/script_atletas.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
