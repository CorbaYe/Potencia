<div class="modal fade" id="dataModal" tabindex="-1" role="dialog" aria-labelledby="dataModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <form method="post" action="{% url 'macrociclos' %}">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title modal-label-color" id="dataModalLabel">Ingrese los datos requeridos</h5>
                    <button type="button" class="close" data-bs-dismiss="modal" aria-label="Cerrar">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <div class="modal-body">
                    <div class="form-group">
                        <label class="modal-label-color" for="dias">Número de Días</label>
                        <input type="number" class="form-control" id="num_days" name="num_days" required>
                    </div>

                    <h5 class="modal-title modal-label-color" id="dataModalLabel">Repeticiones mensuales</h5>
                    <div class="d-flex align-items-center mb-3">
                        <div class="d-flex gap-3">
                            <div class="form-group mb-0">
                                <label class="modal-label-color" for="a_acumulacion">A</label>
                                <input type="number" class="form-control" id="a_acumulacion" name="a_acumulacion">
                            </div>
                            <div class="form-group mb-0">
                                <label class="modal-label-color" for="t_transformacion">T</label>
                                <input type="number" class="form-control" id="t_transformacion" name="t_transformacion">
                            </div>
                            <div class="form-group mb-0">
                                <label class="modal-label-color" for="r_realizacion">R</label>
                                <input type="number" class="form-control" id="r_realizacion" name="r_realizacion">
                            </div>
                        </div>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Enviar Datos</button>
                </div>
            </form>
        </div>
    </div>
</div>
