<div id="dataModal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full backdrop-blur-sm bg-black/50">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-gray-900 border border-gray-700 rounded-xl shadow-lg p-4 md:p-6">
            
            <div class="flex items-center justify-between border-b border-gray-700 pb-4 md:pb-5">
                <h3 class="text-lg font-bold text-white">
                    Nuevo plan de entrenamiento
                </h3>
                <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-800 hover:text-white rounded-lg text-sm w-9 h-9 ms-auto inline-flex justify-center items-center transition-colors" data-modal-hide="dataModal">
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
                    <span class="sr-only">Cerrar</span>
                </button>
            </div>
            
            <form method="post" action="{% url 'macrociclos' %}">
                {% csrf_token %}
                <div class="grid gap-4 grid-cols-2 py-4 md:py-6">
                    
                    <div class="col-span-2">
                        <label for="num_days" class="block mb-2 text-sm font-medium text-gray-300">Número de días</label>
                        <input type="number" name="num_days" id="num_days" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-full px-3 py-2.5 placeholder-gray-500" placeholder="Ej: 30" required>
                    </div>

                    <div class="col-span-2 mt-2">
                        <h5 class="text-sm font-bold text-emerald-400 uppercase tracking-wide border-b border-gray-700 pb-2" id="dataModalLabel">Repeticiones mensuales</h5>
                    </div>

                    <div class="col-span-2 sm:col-span-1">
                        <label for="a_acumulacion" class="block mb-2 text-sm font-medium text-gray-300">A (Acumulación)</label>
                        <input type="number" name="a_acumulacion" id="a_acumulacion" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-full px-3 py-2.5 placeholder-gray-500" placeholder="Ej: 10" required>
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="t_transformacion" class="block mb-2 text-sm font-medium text-gray-300">T (Transformación)</label>
                        <input type="number" name="t_transformacion" id="t_transformacion" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-full px-3 py-2.5 placeholder-gray-500" placeholder="Ej: 15" required>
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="r_realizacion" class="block mb-2 text-sm font-medium text-gray-300">R (Realización)</label>
                        <input type="number" name="r_realizacion" id="r_realizacion" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-full px-3 py-2.5 placeholder-gray-500" placeholder="Ej: 5" required>
                    </div>
                </div>

                <div class="flex items-center space-x-4 border-t border-gray-700 pt-4 md:pt-6">
                    <button type="submit" class="inline-flex items-center text-white bg-emerald-600 hover:bg-emerald-700 focus:ring-4 focus:ring-emerald-900 font-medium rounded-lg text-sm px-5 py-2.5 focus:outline-none transition-colors">
                        <svg class="w-4 h-4 me-2 -ms-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7 7V5"/></svg>
                        Enviar datos
                    </button>
                    <button data-modal-hide="dataModal" type="button" class="text-gray-300 bg-gray-800 border border-gray-700 hover:bg-gray-700 hover:text-white focus:ring-4 focus:ring-gray-700 font-medium rounded-lg text-sm px-5 py-2.5 focus:outline-none transition-colors">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
